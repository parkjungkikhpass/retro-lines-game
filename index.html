<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Retro Lines - 점프 어드벤처</title>
  <style>
    /* 페이지 전체를 검은색으로 하고, 게임 화면을 정중앙에 배치해요 */
    html, body {
      margin: 0;              /* 브라우저 기본 여백 제거 */
      height: 100%;
      background: #100f0f;    /* 게임 배경보다 살짝 더 어두운 색 */
      display: flex;          /* 가운데 정렬을 위한 flexbox */
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: monospace; /* 레트로 느낌의 고정폭 글꼴 */
    }

    /* 게임이 그려지는 도화지(캔버스) */
    canvas {
      /* 원본은 320x192의 작은 그림인데 3배로 확대해서 보여줘요.
         image-rendering: pixelated 이 없으면 픽셀이 뿌옇게 번져요! */
      width: 960px;
      height: 576px;
      image-rendering: pixelated;
      border: 4px solid #333;
      border-radius: 4px;
    }

    /* 조작법 안내 문구 */
    .help {
      color: #888;
      margin-top: 12px;
      font-size: 14px;
    }
    .help b { color: #ffd447; }
  </style>
</head>
<body>
  <!-- 게임 화면: JavaScript가 여기에 매 프레임 그림을 그려요 -->
  <canvas id="game" width="320" height="192"></canvas>

  <p class="help">
    <b>←→</b> 이동 &nbsp;|&nbsp; <b>Shift</b> 달리기! &nbsp;|&nbsp; <b>스페이스</b> 점프/수영 &nbsp;|&nbsp; <b>X</b> 공격 &nbsp;|&nbsp;
    <b>↑↓</b> 사다리 &nbsp;|&nbsp; <b>ESC</b> 메뉴 &nbsp;|&nbsp; 🥕 커지기 &nbsp;|&nbsp; 👹 보스를 잡아야 깃발!
  </p>

  <!-- 게임 로직은 별도 파일에 있어요.
       주소 뒤에 현재 시각을 붙여서 브라우저가 옛날 캐시 대신
       항상 최신 game.js를 불러오게 해요 (개발할 때 아주 유용!) -->
  <script>
/* ============================================================
   Retro Lines - 점프 어드벤처 (슈퍼마리오 스타일)
   에셋: VEXED 님의 Retro Lines (CC0) https://v3x3d.itch.io/retro-lines

   [전체 구조 한눈에 보기]
   1. 기본 설정      - 캔버스, 이미지 불러오기
   2. 스프라이트 표   - 시트 안에서 각 그림이 있는 좌표
   3. 지역(존) 설정   - 숲/사막/밤, 3가지 색 테마
   4. 레벨 지도      - 아스키 그림으로 그린 맵
   5. 키보드 입력
   6. 효과음        - 코드로 만드는 레트로 사운드
   7. 레벨 파싱      - 지도 문자를 게임 오브젝트로 변환 + 자동 장식
   8. 물리/충돌
   9. 플레이어      - 이동/점프/수영/사다리/공격
   10. 기믹         - 스프링/움직이는 발판/무너지는 다리/체크포인트
   11. 적과 보스     - 슬라임/새/보스
   12. 그리기
   13. 게임 루프
   ============================================================ */

});

/* ===== 6. 효과음 ===== */

let audioCtx = null;
function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function beep(f0, f1, dur, vol = 0.12, type = "square", delay = 0) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}

  bossDie:  () => [200, 160, 120, 80, 50].forEach((f, i) => beep(f, f * 0.7, 0.2, 0.2, "sawtooth", i * 0.15)),
};


/* ===== 7. 레벨 파싱 ===== */

let solids = [];
let coins = [], slimes = [], birds = [], carrots = [], trees = [], waters = [];
let fishes = [], waterPlants = []; // 물고기 적 + 수초 장식
let quicksands = [], quickSet = new Set(); // 모래늪(유사): 빠지면 서서히 가라앉아요!
let sun = null;      // 분노한 태양 (마리오3 오마주): 따라오다가 급강하 공격!
let tornados = [];   // 회오리: 닿으면 하늘 높이 붕~ 날아가요
let ladders = [], ladderSet = new Set();
let swimCells = [], swimSet = new Set();
let springs = [], platforms = [], crumbles = [], crumbleMap = new Map(), checkpoints = [];
let decors = [], cacti = [], runes = [], skies = [];
let shots = [];
let shooters = [], enemyShots = []; // 포자버섯 + 적이 쏜 포자
let weaponItems = []; // 주울 수 있는 무기 아이템
let collectibles = []; // 젤리·물약·케이크 파워업
let npcs = [], activeNpc = null; // 대화 NPC + 지금 말 거는 상대
let clouds = []; // 배경에 떠다니는 구름
let boss = null;
let flag = null, flagVisible = true;
let levelW = 0;

const player = {};
let spawnX = 32, spawnY = 100;
let checkpoint = null; // 통과한 체크포인트 (죽어도 여기서 부활!)

let game = { state: "title", score: 0, lives: 3, coinCount: 0, camX: 0, time: 0, shake: 0 };
let particles = [];

// 위치를 넣으면 늘 같은 "무작위스러운" 숫자가 나오는 함수예요.
// 진짜 랜덤을 쓰면 죽어서 다시 할 때마다 장식 위치가 바뀌어버리거든요!
function hash(n) {
  n = (n ^ 61) ^ (n >>> 16);
  n = (n + (n << 3)) | 0;
  n = (n ^ (n >>> 4)) * 0x27d4eb2d;
  return ((n ^ (n >>> 15)) >>> 0);
}

function parseLevel() {
  const stage = STAGES[stageIndex];
  levelW = Math.max(...stage.map.map((r) => r.length));
  const rows = stage.map.map((r) => r.padEnd(levelW, " "));

  solids = []; coins = []; slimes = []; birds = []; carrots = []; trees = []; waters = [];
  fishes = []; waterPlants = [];
  quicksands = []; quickSet = new Set();
  sun = null; tornados = [];
  ladders = []; ladderSet = new Set(); swimCells = []; swimSet = new Set();
  springs = []; platforms = []; crumbles = []; crumbleMap = new Map(); checkpoints = [];
  decors = []; cacti = []; runes = []; skies = [];
  shots = []; boss = null; flag = null; flagVisible = true;
  shooters = []; enemyShots = [];
  weaponItems = []; collectibles = [];
  npcs = []; activeNpc = null;
  // 배경 구름 4개 생성 (하늘 여기저기, 종류·속도 제각각)
  clouds = [];
  for (let i = 0; i < 4; i++) {
    clouds.push({ base: hash(i * 131) % (levelW * TILE), y: 18 + hash(i * 77) % 46,
                  kind: hash(i * 53) % 3, speed: 0.08 + (hash(i * 29) % 6) * 0.02 });
  }

  for (let ty = 0; ty < rows.length; ty++) {
    solids[ty] = [];
    for (let tx = 0; tx < levelW; tx++) {
      const ch = rows[ty][tx];
      const px = tx * TILE, py = ty * TILE;
      // '!'(무너지는 발판)도 처음엔 단단한 땅이에요
      solids[ty][tx] = ch === "#" || ch === "!";

      if (ch === "o") coins.push({ x: px, y: py, taken: false });
      if (ch === "u") carrots.push({ x: px, y: py, taken: false });
      if (ch === "e") slimes.push({ x: px + 2, y: py + 6, w: 12, h: 10, vx: 0, dir: -1, speed: 0.35, alive: true, squash: 0, anim: 0 });
      // 뱀: 슬라임과 같은 규칙(밟기 가능)이지만 더 빨라요! 숲의 순찰자
      if (ch === "s") slimes.push({ x: px + 2, y: py + 6, w: 12, h: 10, vx: 0, dir: -1, speed: 0.55, alive: true, squash: 0, anim: 0, kind: "snake" });
      // 물고기: 물속을 좌우로 헤엄치는 적. 물고기가 있는 칸도 물로 쳐요!
      if (ch === "f") {
        fishes.push({ x: px + 1, y: py + 3, y0: py + 3, w: 14, h: 10, dir: -1, speed: 0.45, alive: true, anim: 0, t: hash(tx * 61) % 100 });
        swimCells.push({ tx, ty }); swimSet.add(tx + "," + ty);
      }
      if (ch === "b") birds.push({ x0: px, y0: py, x: px, y: py, w: 12, h: 10, alive: true, t: 0, phase: hash(tx) % 200 });
      if (ch === "m") shooters.push({ x: px + 2, y: py + 4, w: 12, h: 12, alive: true, squash: 0, anim: 0, shootCd: 40 + hash(tx) % 60, face: -1 });
      // 무기 아이템: G=소총 K=검 J=창
      if (ch === "G") weaponItems.push({ x: px, y: py, kind: "rifle", taken: false });
      if (ch === "K") weaponItems.push({ x: px, y: py, kind: "sword", taken: false });
      if (ch === "J") weaponItems.push({ x: px, y: py, kind: "spear", taken: false });
      // 수집품: j=젤리(+500) p=물약(무적) k=케이크(1UP)
      if (ch === "j") collectibles.push({ x: px, y: py, kind: "gem", taken: false });
      if (ch === "p") collectibles.push({ x: px, y: py, kind: "potion", taken: false });
      if (ch === "k") collectibles.push({ x: px, y: py, kind: "cake", taken: false });
      // NPC: N=시민 Q=왕 Z=마법사 Y=상인 (대사는 종류별 고정)
      if (ch === "N") npcs.push({ x: px, y: py, kind: "citizen", anim: hash(tx) % 80, text: "모험을 떠나는군요! 부디 조심해요." });
      if (ch === "Q") npcs.push({ x: px, y: py, kind: "king", anim: 0, text: "용사여, 눈보라 성의 마왕을 물리쳐다오!" });
      if (ch === "Z") npcs.push({ x: px, y: py, kind: "wizard", anim: 20, text: "Shift로 달리면 더 멀리 점프한다네." });
      if (ch === "Y") npcs.push({ x: px, y: py, kind: "merchant", anim: 40, text: "X키로 무기를 쓰시오! 코인도 모으고." });
      if (ch === "t") trees.push({ x: px, bottom: py + TILE, zone: zoneAt(tx), kind: hash(tx * 37) % 8 });
      if (ch === "w") waters.push({ tx, ty });
      // 모래늪: 밟으면 서서히 가라앉는 위험한 모래 (사막 월드의 명물!)
      if (ch === "q") { quicksands.push({ tx, ty }); quickSet.add(tx + "," + ty); }
      // 분노한 태양: 레벨 중반까진 따라만 오다가, 지나가면 급강하 공격!
      if (ch === "A") sun = { x: px, y: py, alive: true, state: "follow", t: 0, hp: 3, hurtT: 0, sx: 0, sy: 0, ex: 0, cd: 0 };
      // 회오리: 닿으면 위로 붕~! (위험이자 도구 - 넓은 구멍을 건너는 열쇠)
      if (ch === "T") tornados.push({ x: px + 1, y: py - 32, w: 14, h: 46, phase: hash(tx * 7) % 100, cd: 0 });
      if (ch === "L") { ladders.push({ tx, ty }); ladderSet.add(tx + "," + ty); }
      if (ch === "W") { swimCells.push({ tx, ty }); swimSet.add(tx + "," + ty); }
      if (ch === "S") springs.push({ x: px, y: py, anim: 0 });
      if (ch === "M") platforms.push({ cx: px, cy: py, x: px, y: py, w: 32, h: 8, axis: "h", dx: 0, dy: 0 });
      if (ch === "V") platforms.push({ cx: px, cy: py, x: px, y: py, w: 32, h: 8, axis: "v", dx: 0, dy: 0 });
      if (ch === "!") { const c = { tx, ty, state: 0, timer: 0 }; crumbles.push(c); crumbleMap.set(tx + "," + ty, c); }
      if (ch === "C") {
        const cp = { x: px, y: py, active: false };
        // 이미 통과한 체크포인트라면 (죽어서 다시 시작) 켜진 상태로 복원
        if (checkpoint && checkpoint.x === px) cp.active = true;
        checkpoints.push(cp);
      }
      if (ch === "P") { spawnX = px; spawnY = py; }
      if (ch === "F") flag = { x: px, y: py };
      if (ch === "B") {
        boss = { x: px - 8, y: py - 28, w: 30, h: 42, hp: 6, maxHp: 6, alive: true, minX: px - 224,
                 active: false, dir: -1, vx: 0, vy: 0, timer: 0, hurtT: 0, anim: 0 };
        flagVisible = false;
      }
    }
  }

  // --- 수초 심기: 물 바닥 칸마다 주사위 → 하늘하늘 흔들리는 물풀! ---
  for (const w of swimCells) {
    const h = hash(w.tx * 977 + w.ty * 31);
    if (w.ty + 1 < solids.length && solids[w.ty + 1][w.tx] && h % 10 < 6) {
      waterPlants.push({ x: w.tx * TILE, y: w.ty * TILE, yellow: h % 2 === 0, phase: h % 48 });
    }
  }

  // --- 자동 장식 심기: 땅 위 빈 칸마다 주사위를 굴려 잔디/꽃/바위를 놓아요 ---
  // (제작자 예시 장면처럼 바닥을 풍성하게! 숲은 더 우거지게 70%)
  for (let ty = 1; ty < rows.length; ty++) {
    for (let tx = 0; tx < levelW; tx++) {
      if (solids[ty][tx] && rows[ty][tx] === "#" && rows[ty - 1][tx] === " ") {
        const h = hash(tx * 7919 + ty * 131);
        const chance = zoneAt(tx).name === "FOREST" ? 7 : 5; // 숲 70% / 그 외 50%
        if (h % 10 < chance) {
          decors.push({ x: tx * TILE, y: (ty - 1) * TILE, rect: SPR.decors[h % SPR.decors.length], off: zoneAt(tx).off });
        }
      }
    }
  }

  // --- 사막 선인장: 사막 스테이지의 땅 위에 자동으로 심어요 ---
  if (zoneAt().name === "DESERT") {
    for (let tx = 4; tx < levelW - 3; tx += 3) {
      if (hash(tx * 613) % 10 >= 2) continue;
      for (let ty = 1; ty < rows.length; ty++) {
        if (solids[ty][tx] && rows[ty - 1][tx] === " " && rows[ty - 1][tx + 1] === " ") {
          cacti.push({ x: tx * TILE - 16, y: ty * TILE - 48 });
          break;
        }
      }
    }
  }

  // --- 공중 룬 문양: 신비로운 분위기 담당 (밤 지역에 더 많이) ---
  for (let tx = 4; tx < levelW; tx += 5) {
    const h = hash(tx * 271);
    const night = zoneAt().name === "NIGHT";
    if (h % 10 < (night ? 6 : 3)) {
      const ty = 2 + ((h >>> 4) % 5); // >>>: 음수가 안 나오는 안전한 나누기
      if (!solids[ty][tx] && !swimSet.has(tx + "," + ty)) {
        runes.push({ x: tx * TILE + (h % 8), y: ty * TILE, phase: h % 250 });
      }
    }
  }

  // --- 하늘 장식: 밤엔 반짝이는 별, 숲/사막엔 바람 줄기 (v3.3 추가 스프라이트!) ---
  const isNight = zoneAt().name === "NIGHT";
  const skyRects = isNight ? [[16, 1104], [64, 1104], [112, 1104]] : [[16, 1232], [160, 1232]];
  for (let tx = 2; tx < levelW; tx += 4) {
    const h = hash(tx * 97);
    if (h % 10 < (isNight ? 7 : 3)) {
      const ty = 1 + ((h >>> 5) % 4);
      if (!solids[ty][tx]) skies.push({ x: tx * TILE, y: ty * TILE, rect: skyRects[h % skyRects.length], phase: h % 300 });
    }
  }

  resetPlayer();
}

// 스테이지 시작: 지도를 새로 만들고 "WORLD 1-1" 안내를 보여줘요
function startStage(i) {
  stageIndex = i;
  checkpoint = null; // 체크포인트는 스테이지마다 새로!
  parseLevel();
  game.camX = 0;
  game.state = "intro";
  game.stateT = 0;
}

function resetPlayer() {
  // 체크포인트를 지났다면 거기서, 아니면 맵의 P 위치에서 시작해요
  player.x = checkpoint ? checkpoint.x : spawnX;
  player.y = checkpoint ? checkpoint.y - 4 : spawnY;
  player.w = 10; player.h = 14;
  player.vx = 0; player.vy = 0;
  player.face = 1;
  player.onGround = false;
  player.big = false;
  player.invincible = 0;
  player.anim = 0;
  player.dying = false; player.deadTimer = 0;
  player.coyote = 0; player.jumpBuffer = 0;
  player.climbing = false;
  player.inWater = false;
  player.strokeCd = 0;
  player.shootCd = 0;
  player.atkPose = 0;
  player.weapon = "basic"; // 무기: basic(구슬)/rifle(연사)/sword(근접)/spear(관통)
  player.meleeT = 0;       // 검 휘두르는 순간 판정 타이머
  player.inSand = false;   // 모래늪에 빠졌나?
  player.sandCd = 0;       // 모래늪 발버둥 점프 쿨타임
}


/* ===== 8. 물리/충돌 ===== */

function solidAt(px, py) {
  const tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if (tx < 0 || tx >= levelW) return true;
  if (ty < 0 || ty >= solids.length) return false;
  return solids[ty][tx];
}

function ladderAt(px, py) { return ladderSet.has(Math.floor(px / TILE) + "," + Math.floor(py / TILE)); }
function swimAt(px, py) { return swimSet.has(Math.floor(px / TILE) + "," + Math.floor(py / TILE)); }
function sandAt(px, py) { return quickSet.has(Math.floor(px / TILE) + "," + Math.floor(py / TILE)); }

// 주의: 폭이 w인 몸은 픽셀 x ~ x+w-1 까지만 차지해요 (그래서 w-1, h-1)
function rectHitsSolid(x, y, w, h) {
  for (let ox = 0; ox <= w - 1; ox += (w - 1) / 2)
    for (let oy = 0; oy <= h - 1; oy += (h - 1) / 2)
      if (solidAt(x + ox, y + oy)) return true;
  return false;
}

function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function moveBody(body) {
  body.x += body.vx;
  if (rectHitsSolid(body.x, body.y, body.w, body.h)) {
    body.x = Math.round(body.x);
    while (rectHitsSolid(body.x, body.y, body.w, body.h)) body.x -= Math.sign(body.vx);
    body.hitWall = true; body.vx = 0;
  } else body.hitWall = false;

  body.y += body.vy;
  if (rectHitsSolid(body.x, body.y, body.w, body.h)) {
    body.y = Math.round(body.y);
    while (rectHitsSolid(body.x, body.y, body.w, body.h)) body.y -= Math.sign(body.vy);
    body.vy = 0;
  }
  body.onGround = body.vy >= 0 && rectHitsSolid(body.x, body.y + 1, body.w, body.h);
}


/* ===== 9. 플레이어 ===== */

const WALK_SPEED = 1.7;   // 걷기 최고 속도
const RUN_SPEED = 2.7;    // Shift 달리기 최고 속도!
const ACCEL = 0.15;
const GRAVITY = 0.26;
const JUMP_POWER = 5.6;
const MAX_FALL = 5.5;

function updatePlayer() {
  if (player.dying) {
    player.vy += GRAVITY * 0.7;
    player.y += player.vy;
    player.deadTimer++;
    if (player.deadTimer > 110) {
      game.lives--;
      if (game.lives <= 0) { game.state = "gameover"; }
      else { parseLevel(); }
    }
    return;
  }

  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const wasInWater = player.inWater;
  const wasInSand = player.inSand;
  player.inWater = swimAt(cx, cy);
  player.inSand = sandAt(cx, cy);
  const jumpKey = keys.Space || keys.ArrowUp || keys.KeyW;

  if (!wasInWater && player.inWater && player.vy > 1) {
    SFX.splash();
    spawnSparkle(cx, player.y, "#6fb9ff");
    player.vy *= 0.3;
  }
  // 모래늪에 풍덩! 떨어지던 속도가 확 죽어요 (모래는 무거우니까)
  if (!wasInSand && player.inSand && player.vy > 1) {
    SFX.crack();
    spawnSparkle(cx, player.y + player.h, "#d8b24a");
    player.vy *= 0.15;
  }

  if (!player.climbing && ladderAt(cx, cy) && (keys.ArrowUp || keys.ArrowDown)) {
    player.climbing = true;
    player.vx = 0; player.vy = 0;
    player.x = Math.floor(cx / TILE) * TILE + (TILE - player.w) / 2;
  }

  if (player.climbing) {
    // ===== 사다리 모드 =====
    player.vy = keys.ArrowUp ? -1.1 : keys.ArrowDown ? 1.1 : 0;
    player.vx = keys.ArrowLeft ? -0.8 : keys.ArrowRight ? 0.8 : 0;
    moveBody(player);
    if (player.vy !== 0) player.anim += 0.15;
    if (!ladderAt(player.x + player.w / 2, player.y + player.h / 2)) player.climbing = false;
    if (player.onGround && keys.ArrowDown) player.climbing = false;
    if (keys.Space && player.jumpBuffer === 0) {
      player.climbing = false;
      player.vy = -JUMP_POWER * 0.75;
      SFX.jump();
    }
    player.jumpBuffer = keys.Space ? player.jumpBuffer + 1 : 0;

  } else if (player.inWater) {
    // ===== 수영 모드 =====
    let want = 0;
    if (keys.ArrowLeft || keys.KeyA) want = -WALK_SPEED * 0.75;
    if (keys.ArrowRight || keys.KeyD) want = WALK_SPEED * 0.75;
    player.vx += Math.sign(want - player.vx) * Math.min(ACCEL * 0.6, Math.abs(want - player.vx));
    if (want !== 0) player.face = Math.sign(want);

    player.strokeCd = Math.max(0, player.strokeCd - 1);
    if (jumpKey && player.strokeCd === 0) {
      // 머리 3px 위가 물이 아니면 "수면 위"로 인정 → 힘차게 물 밖으로 점프!
      // (한 칸 깊이 웅덩이 바닥에 서 있어도 바로 뛰쳐나올 수 있게 여유를 줬어요)
      const surfaced = !swimAt(cx, player.y - 3);
      player.vy = surfaced ? -5.0 : -1.9;
      player.strokeCd = 12;
      player.anim += 1;
      SFX.swim();
      spawnSparkle(cx, player.y + player.h, "#6fb9ff");
    }
    player.vy = Math.min(player.vy + GRAVITY * 0.28, 1.2);
    moveBody(player);

  } else if (player.inSand) {
    // ===== 모래늪 모드: 몸이 무거워요! 서서히 가라앉아요 =====
    let want = 0;
    if (keys.ArrowLeft || keys.KeyA) want = -0.55;   // 모래 속에선 아주 느리게
    if (keys.ArrowRight || keys.KeyD) want = 0.55;
    player.vx += Math.sign(want - player.vx) * Math.min(0.07, Math.abs(want - player.vx));
    if (want !== 0) player.face = Math.sign(want);

    player.sandCd = Math.max(0, player.sandCd - 1);
    if (jumpKey && player.sandCd === 0) {
      // 몸이 표면 근처면 힘차게 탈출 점프! 깊이 잠겼으면 꿈틀거리기만...
      const nearSurface = !sandAt(cx, player.y - 2);
      player.vy = nearSurface ? -4.8 : -1.2;
      player.sandCd = 16;
      SFX.crack();
      spawnSparkle(cx, player.y + player.h, "#d8b24a");
    }
    // 가만히 있으면 계속 가라앉아요 (최대 속도는 느리게)
    player.vy = Math.min(player.vy + 0.1, 0.4);
    moveBody(player);
    player.anim += 0.05;

  } else {
    // ===== 일반 모드 =====
    // Shift를 누르면 달리기! (마리오의 B대시처럼)
    const running = keys.ShiftLeft || keys.ShiftRight;
    const topSpeed = running ? RUN_SPEED : WALK_SPEED;
    let want = 0;
    if (keys.ArrowLeft || keys.KeyA) want = -topSpeed;
    if (keys.ArrowRight || keys.KeyD) want = topSpeed;
    // 달릴 땐 가속이 살짝 느려서 "묵직한 질주감"이 생겨요
    const accel = running ? ACCEL * 0.7 : ACCEL;
    player.vx += Math.sign(want - player.vx) * Math.min(accel, Math.abs(want - player.vx));
    if (want !== 0) player.face = Math.sign(want);

    // 전속력 달리기 흙먼지 + 급방향전환(스키드) 연출
    if (player.onGround && Math.abs(player.vx) > 2.2 && game.time % 6 === 0) {
      particles.push({ x: player.x + (player.vx > 0 ? 0 : player.w), y: player.y + player.h - 1,
                       color: "#8a8a6a", life: 14, vx: -player.vx * 0.15, vy: -0.4 });
    }
    if (player.onGround && want !== 0 && Math.sign(want) !== Math.sign(player.vx) && Math.abs(player.vx) > 1.8) {
      spawnSparkle(player.x + player.w / 2, player.y + player.h, "#8a8a6a"); // 끼익!
    }

    player.coyote = player.onGround ? 6 : Math.max(0, player.coyote - 1);
    player.jumpBuffer = jumpKey ? player.jumpBuffer + 1 : 0;

    if (jumpKey && player.jumpBuffer <= 6 && player.coyote > 0) {
      // 빨리 달릴수록 점프도 조금 더 높아져요 (전속력이면 약 12% 보너스)
      player.vy = -(JUMP_POWER + Math.abs(player.vx) * 0.25);
      player.coyote = 0;
      player.noCut = false; // 내 점프는 손을 떼면 낮게 조절 가능
      SFX.jump();
    }
    // 점프키에서 손을 떼면 낮게 점프 — 단, 스프링/밟기 반동(noCut)은 자르지 않아요!
    if (!jumpKey && player.vy < -2 && !player.noCut) player.vy = -2;
    if (player.vy >= 0) player.noCut = false;

    player.vy = Math.min(player.vy + GRAVITY, MAX_FALL);
    moveBody(player);
    player.anim += Math.abs(player.vx) * 0.25;
  }

  // --- 움직이는 발판에 올라타기: 발판 위에 서면 발판과 함께 움직여요! ---
  for (const p of platforms) {
    const feet = player.y + player.h;
    if (player.vy >= 0 && player.x + player.w > p.x + 2 && player.x < p.x + p.w - 2 &&
        feet >= p.y - 2 && feet <= p.y + 7) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.x += p.dx; // 발판이 움직인 만큼 나도 같이!
    }
  }

  // --- 스프링: 밟으면 평소의 2배 높이로 뽀요용! ---
  for (const s of springs) {
    if (player.vy > 0.5 && overlap(player, { x: s.x + 2, y: s.y + 6, w: 12, h: 10 })) {
      player.vy = -7.7;
      player.noCut = true; // 스프링 반동은 끝까지 올라가요
      s.anim = 12;
      SFX.spring();
      spawnSparkle(s.x + 8, s.y + 8, "#ffd447");
    }
  }

  // --- 무너지는 발판: 밟으면 흔들리다가 와르르! ---
  if (player.onGround) {
    const footY = Math.floor((player.y + player.h + 1) / TILE);
    for (const fx of [Math.floor(player.x / TILE), Math.floor((player.x + player.w - 1) / TILE)]) {
      const c = crumbleMap.get(fx + "," + footY);
      if (c && c.state === 0) { c.state = 1; c.timer = 0; SFX.crack(); }
    }
  }

  // --- 체크포인트: 닿으면 부활 지점이 여기로! ---
  for (const cp of checkpoints) {
    if (!cp.active && overlap(player, { x: cp.x, y: cp.y - 16, w: 16, h: 32 })) {
      cp.active = true;
      checkpoint = { x: cp.x, y: cp.y };
      SFX.checkpoint();
      spawnSparkle(cp.x + 8, cp.y, "#4bd44b");
    }
  }

  // --- X키 공격 (무기에 따라 다르게!) ---
  player.shootCd = Math.max(0, player.shootCd - 1);
  player.atkPose = Math.max(0, player.atkPose - 1);
  player.meleeT = Math.max(0, player.meleeT - 1);
  if ((keys.KeyX || keys.KeyZ) && player.shootCd === 0 && !player.climbing) {
    if (player.weapon === "sword") {
      // 검: 발사체 없이 앞쪽을 크게 휘둘러 근접 처치 (연타 빠름)
      player.meleeT = 10;
      player.shootCd = 16;
      meleeAttack();
    } else {
      // 발사체 무기: rifle=빠른연사, spear=관통, basic=기본 구슬
      const rifle = player.weapon === "rifle";
      shots.push({
        x: player.x + (player.face > 0 ? player.w + 2 : -4),
        y: player.y + 5,
        vx: (rifle ? 4.2 : 3.2) * player.face, life: 80,
        pierce: player.weapon === "spear", // 창은 적을 뚫어요
      });
      player.shootCd = rifle ? 8 : 20; // 소총은 훨씬 빠르게
      SFX.shoot();
    }
    player.atkPose = 12;
  }

  if (player.y > VIEW_H + 40) startDeath();
  if (player.invincible > 0) player.invincible--;

  // --- 코인 ---
  for (const c of coins) {
    if (!c.taken && overlap(player, { x: c.x + 3, y: c.y + 3, w: 10, h: 10 })) {
      c.taken = true;
      game.coinCount++; game.score += 100;
      SFX.coin();
      spawnSparkle(c.x + 8, c.y + 8, "#ffd447");
    }
  }

  // --- 무기 줍기: 닿으면 그 무기로 교체! ---
  for (const w of weaponItems) {
    if (!w.taken && overlap(player, { x: w.x + 1, y: w.y, w: 14, h: 16 })) {
      w.taken = true;
      player.weapon = w.kind;
      game.score += 300;
      SFX.power();
      spawnSparkle(w.x + 8, w.y + 8, "#ffd447");
    }
  }

  // --- 수집품 파워업: 젤리(점수)·물약(무적)·케이크(1UP) ---
  for (const c of collectibles) {
    if (c.taken || !overlap(player, { x: c.x + 3, y: c.y + 3, w: 10, h: 10 })) continue;
    c.taken = true;
    if (c.kind === "gem") {         // 젤리: 큰 점수 보너스
      game.score += 500;
      SFX.coin();
      spawnSparkle(c.x + 8, c.y + 8, "#ffd447");
    } else if (c.kind === "potion") { // 물약: 5초 무적!
      player.invincible = 300;
      game.score += 200;
      SFX.power();
      for (let i = 0; i < 8; i++) spawnSparkle(c.x + 8, c.y + 8, "#ff8830");
    } else if (c.kind === "cake") {   // 케이크: 목숨 +1 (1UP)
      game.lives++;
      SFX.power();
      for (let i = 0; i < 10; i++) spawnSparkle(c.x + 8, c.y + 8, "#4bd44b");
    }
  }

  // --- 당근 ---
  for (const c of carrots) {
    if (!c.taken && overlap(player, { x: c.x + 2, y: c.y + 2, w: 12, h: 14 })) {
      c.taken = true;
      game.score += 500;
      if (!player.big) { player.big = true; SFX.power(); }
      else SFX.coin();
      spawnSparkle(c.x + 8, c.y + 8, "#ff8830");
    }
  }

  // --- 슬라임 ---
  for (const s of slimes) {
    if (!s.alive || s.squash > 0) continue;
    if (overlap(player, s)) {
      if (player.vy > 0 && player.y + player.h - s.y < 8) {
        s.squash = 1;
        player.vy = -3.2;
        player.noCut = true;
        game.score += 200;
        SFX.stomp();
        spawnSparkle(s.x + 6, s.y + 5, "#ff8830");
      } else if (player.invincible === 0) {
        hurtPlayer();
      }
    }
  }

  // --- 새: 공중에서 8자를 그리며 날아다녀요 ---
  for (const b of birds) {
    if (!b.alive) continue;
    if (overlap(player, b)) {
      if (player.vy > 0 && player.y + player.h - b.y < 8) {
        b.alive = false;
        player.vy = -3.5;
        player.noCut = true;
        game.score += 300;
        SFX.stomp();
        spawnSparkle(b.x + 6, b.y + 5, "#ffffff");
      } else if (player.invincible === 0) {
        hurtPlayer();
      }
    }
  }

  // --- 골인 깃발 ---
  if (flag && flagVisible && game.state === "play" && overlap(player, { x: flag.x + 4, y: flag.y - 32, w: 8, h: 48 })) {
    game.state = "clear";
    game.stateT = 0;
    game.score += 5000;
    SFX.clear();
    for (let i = 0; i < 40; i++)
      spawnSparkle(flag.x + 8 + (Math.random() - 0.5) * 60, flag.y - 20 - Math.random() * 60,
        ["#ffd447", "#4bd44b", "#ff8830", "#ff4b8f"][i % 4]);
  }

  // --- NPC 근처면 대화 표시 (NPC는 무해해요, 밟거나 부딪혀도 안전) ---
  activeNpc = null;
  for (const n of npcs) {
    if (Math.abs(player.x - n.x) < 22 && Math.abs(player.y - n.y) < 26) { activeNpc = n; break; }
  }
}

function hurtPlayer() {
  if (player.big) {
    player.big = false;
    player.invincible = 90;
    SFX.hurt();
  } else {
    startDeath();
  }
}

function startDeath() {
  if (player.dying) return;
  player.dying = true;
  player.deadTimer = 0;
  player.vy = -4.5;
  SFX.dead();
}

// 검 근접 공격: 플레이어 앞쪽 큰 사각형 안의 적을 한 번에 처치
function meleeAttack() {
  SFX.shoot();
  // 검 판정 범위: 몸통 전체 + 바라보는 방향으로 넉넉히(reach만큼) 뻗어요.
  // 왼쪽/오른쪽이 완전히 대칭이라, 어느 쪽을 봐도 똑같이 잘 맞아요!
  const reach = 20; // 앞으로 뻗는 사거리(약 1.25칸)
  const range = {
    x: player.face > 0 ? player.x - 4 : player.x - reach + 4,
    y: player.y - 3,
    w: player.w + reach,
    h: player.h + 6,
  };
  for (const s of slimes) if (s.alive && s.squash === 0 && overlap(range, s)) { s.squash = 1; game.score += 200; spawnSparkle(s.x + 6, s.y + 5, "#fff"); }
  for (const b of birds) if (b.alive && overlap(range, b)) { b.alive = false; game.score += 300; spawnSparkle(b.x + 6, b.y + 5, "#fff"); }
  for (const f of fishes) if (f.alive && overlap(range, f)) { f.alive = false; game.score += 250; spawnSparkle(f.x + 7, f.y + 5, "#6fb9ff"); }
  for (const s of shooters) if (s.alive && s.squash === 0 && overlap(range, s)) { s.squash = 1; game.score += 250; spawnSparkle(s.x + 6, s.y + 5, "#ff4b4b"); }
  if (boss && boss.alive && boss.hurtT === 0 && overlap(range, boss)) damageBoss();
  // 급강하하는 태양을 검으로 맞받아치기! (간지 폭발)
  if (sun && sun.alive && sun.hurtT === 0 && overlap(range, { x: sun.x - 7, y: sun.y - 7, w: 14, h: 14 })) {
    sun.hp--; sun.hurtT = 20;
    SFX.bossHurt();
    spawnSparkle(sun.x, sun.y, "#ffd447");
    if (sun.hp <= 0) {
      sun.alive = false;
      game.score += 1000;
      SFX.bossDie();
      for (let i = 0; i < 16; i++) spawnSparkle(sun.x + (Math.random() - 0.5) * 20, sun.y + (Math.random() - 0.5) * 20, "#ffd447");
    }
  }
}

function updateShots() {
  for (const sh of shots) {
    sh.x += sh.vx;
    sh.life--;
    if (solidAt(sh.x + 2, sh.y + 2)) { sh.life = 0; spawnSparkle(sh.x, sh.y, "#ffd447"); }
    for (const s of slimes) {
      if (s.alive && s.squash === 0 && overlap({ x: sh.x, y: sh.y, w: 4, h: 4 }, s)) {
        s.squash = 1; if (!sh.pierce) sh.life = 0; // 창(pierce)은 뚫고 지나가요
        game.score += 200;
        SFX.stomp();
        spawnSparkle(s.x + 6, s.y + 5, "#ff8830");
      }
    }
    for (const b of birds) {
      if (b.alive && overlap({ x: sh.x, y: sh.y, w: 4, h: 4 }, b)) {
        b.alive = false; if (!sh.pierce) sh.life = 0;
        game.score += 300;
        SFX.stomp();
        spawnSparkle(b.x + 6, b.y + 5, "#ffffff");
      }
    }
    for (const f of fishes) {
      if (f.alive && overlap({ x: sh.x, y: sh.y, w: 4, h: 4 }, f)) {
        f.alive = false; if (!sh.pierce) sh.life = 0;
        game.score += 250;
        SFX.stomp();
        spawnSparkle(f.x + 7, f.y + 5, "#6fb9ff");
      }
    }
    for (const s of shooters) {
      if (s.alive && s.squash === 0 && overlap({ x: sh.x, y: sh.y, w: 4, h: 4 }, s)) {
        s.squash = 1; if (!sh.pierce) sh.life = 0;
        game.score += 250;
        SFX.stomp();
        spawnSparkle(s.x + 6, s.y + 5, "#ff4b4b");
      }
    }
    if (boss && boss.alive && boss.hurtT === 0 && overlap({ x: sh.x, y: sh.y, w: 4, h: 4 }, boss)) {
      sh.life = 0;
      damageBoss();
    }
    // 분노한 태양도 총으로 잡을 수 있어요! (3발 명중 = 1000점)
    if (sun && sun.alive && sun.hurtT === 0 &&
        overlap({ x: sh.x, y: sh.y, w: 4, h: 4 }, { x: sun.x - 7, y: sun.y - 7, w: 14, h: 14 })) {
      if (!sh.pierce) sh.life = 0;
      sun.hp--; sun.hurtT = 20;
      SFX.bossHurt();
      spawnSparkle(sun.x, sun.y, "#ffd447");
      if (sun.hp <= 0) {
        sun.alive = false;
        game.score += 1000;
        SFX.bossDie();
        for (let i = 0; i < 16; i++) spawnSparkle(sun.x + (Math.random() - 0.5) * 20, sun.y + (Math.random() - 0.5) * 20, "#ffd447");
      }
    }
  }
  shots = shots.filter((sh) => sh.life > 0);
}


/* ===== 10. 기믹 (스프링/발판/체크포인트) ===== */

function updateGimmicks() {
  // 스프링 눌림 애니메이션 복원
  for (const s of springs) s.anim = Math.max(0, s.anim - 1);

  // 움직이는 발판: 사인 곡선으로 부드럽게 왕복해요
  for (const p of platforms) {
    const nx = p.cx + (p.axis === "h" ? Math.sin(game.time / 60) * 42 : 0);
    const ny = p.cy + (p.axis === "v" ? Math.sin(game.time / 55) * 30 : 0);
    p.dx = nx - p.x; p.dy = ny - p.y; // 이번 프레임에 움직인 거리 (플레이어 태워가기용)
    p.x = nx; p.y = ny;
  }

  // 무너지는 발판의 일생: 멀쩡함 → 흔들림(0.7초) → 붕괴 → 4초 후 부활
  for (const c of crumbles) {
    if (c.state === 1) {
      c.timer++;
      if (c.timer > 40) {
        c.state = 2; c.timer = 0;
        solids[c.ty][c.tx] = false; // 이제 밟을 수 없어요!
        SFX.crumble();
        for (let i = 0; i < 4; i++)
          particles.push({ x: c.tx * 16 + 8, y: c.ty * 16 + 8, color: "#c8a468",
                           life: 40, vx: (Math.random() - 0.5) * 2, vy: Math.random() * 1.5 });
      }
    } else if (c.state === 2) {
      c.timer++;
      // 부활하기 전에 그 자리에 플레이어가 있으면 잠시 기다려요 (몸에 벽이 생기면 안 되니까!)
      const cellRect = { x: c.tx * 16, y: c.ty * 16, w: 16, h: 16 };
      if (c.timer > 240 && !overlap(player, cellRect)) {
        c.state = 0; c.timer = 0;
        solids[c.ty][c.tx] = true;
        spawnSparkle(c.tx * 16 + 8, c.ty * 16 + 8, "#c8a468");
      }
    }
  }
}


/* ===== 11. 적과 보스 ===== */

function updateSlimes() {
  for (const s of slimes) {
    if (!s.alive) continue;
    if (s.squash > 0) {
      s.squash++;
      if (s.squash > 25) s.alive = false;
      continue;
    }
    s.vx = s.speed * s.dir;
    const aheadX = s.dir < 0 ? s.x - 1 : s.x + s.w;
    const cliff = !solidAt(aheadX, s.y + s.h + 2);
    s.vy = Math.min((s.vy || 0) + GRAVITY, MAX_FALL);
    moveBody(s);
    if (s.hitWall || (cliff && s.onGround)) s.dir = -s.dir;
    s.anim += 0.15;
  }
}

function updateBirds() {
  for (const b of birds) {
    if (!b.alive) continue;
    b.t++;
    const prevX = b.x;
    // 가로로 크게, 세로로 잘게 흔들리는 비행 경로
    b.x = b.x0 + Math.sin((b.t + b.phase) / 80) * 48;
    b.y = b.y0 + Math.sin((b.t + b.phase) / 30) * 8;
    b.dirX = Math.sign(b.x - prevX) || 1;
  }
}

// 물고기: 물속을 좌우로 헤엄쳐요. 앞이 물이 아니면(벽/공기) 뒤돌아요!
function updateFishes() {
  for (const f of fishes) {
    if (!f.alive) continue;
    f.anim += 0.15;
    f.x += f.speed * f.dir;
    // 진행 방향 앞 칸이 물이 아니면 방향 전환 → 절대 물 밖으로 안 나가요
    const aheadX = f.dir < 0 ? f.x - 1 : f.x + f.w + 1;
    if (!swimAt(aheadX, f.y + f.h / 2)) f.dir = -f.dir;
    // 위아래로 살짝 둥실둥실 (물속 느낌)
    f.y = f.y0 + Math.sin((game.time + f.t) / 25) * 2;
    // 플레이어와 부딪히면 아야! (물속이라 밟기는 안 통해요)
    if (!player.dying && player.invincible === 0 && overlap(player, f)) hurtPlayer();
  }
}

// 포자버섯: 제자리에 있다가 플레이어가 화면 안에 있으면 주기적으로 포자 발사
function updateShooters() {
  for (const s of shooters) {
    if (!s.alive) continue;
    if (s.squash > 0) { // 밟혀서 납작해진 동안
      s.squash++;
      if (s.squash > 25) s.alive = false;
      continue;
    }
    s.anim += 0.1;
    s.face = player.x < s.x ? -1 : 1; // 플레이어 쪽을 바라봐요
    // 화면에 보이고 너무 멀지 않을 때만 발사 (약 140px 이내)
    const dist = Math.abs(player.x - s.x);
    if (dist < 140 && !player.dying) {
      s.shootCd--;
      if (s.shootCd <= 0) {
        s.shootCd = 90; // 1.5초마다 발사
        enemyShots.push({ x: s.x + 4, y: s.y + 2, vx: 1.7 * s.face, vy: -0.4, life: 130 });
        s.atk = 14; // 공격 자세 표시
      }
    }
    if (s.atk > 0) s.atk--;

    // 밟혀서 처치 (플레이어가 위에서 떨어질 때)
    if (overlap(player, s) && !player.dying) {
      if (player.vy > 0 && player.y + player.h - s.y < 9) {
        s.squash = 1;
        player.vy = -3.2; player.noCut = true;
        game.score += 250;
        SFX.stomp();
        spawnSparkle(s.x + 6, s.y + 5, "#ff4b4b");
      } else if (player.invincible === 0) {
        hurtPlayer();
      }
    }
  }

  // 적 포자: 날아가다가 플레이어에 맞으면 데미지, 벽에 맞으면 소멸
  for (const es of enemyShots) {
    es.x += es.vx;
    es.vy += 0.03; es.y += es.vy; // 살짝 포물선
    es.life--;
    if (solidAt(es.x + 2, es.y + 2)) { es.life = 0; spawnSparkle(es.x, es.y, "#ff4b4b"); }
    if (!player.dying && player.invincible === 0 &&
        overlap(player, { x: es.x, y: es.y, w: 4, h: 4 })) {
      es.life = 0;
      hurtPlayer();
    }
    // 플레이어 발사체와 부딪히면 서로 소멸
    for (const sh of shots) {
      if (overlap({ x: es.x, y: es.y, w: 4, h: 4 }, { x: sh.x, y: sh.y, w: 4, h: 4 })) {
        es.life = 0; sh.life = 0; spawnSparkle(es.x, es.y, "#ffd447");
      }
    }
  }
  enemyShots = enemyShots.filter((es) => es.life > 0);
}

// 분노한 태양: 전반부엔 하늘에서 따라만 와요. 레벨 절반을 넘는 순간... 돌변!
function updateSun() {
  if (!sun || !sun.alive) return;
  sun.hurtT = Math.max(0, sun.hurtT - 1);
  sun.t++;

  if (sun.state === "follow") {
    // 플레이어 살짝 앞에서 두둥실 (아직은 얌전...)
    const targetX = player.x + 40;
    sun.x += (targetX - sun.x) * 0.04;
    sun.y = 26 + Math.sin(sun.t / 30) * 3;
    // 레벨 절반을 지나면 분노 모드!
    if (player.x > levelW * TILE * 0.5) { sun.state = "windup"; sun.t = 0; SFX.bossRoar(); }

  } else if (sun.state === "windup") {
    // 부들부들 떨며 조준 (도망칠 시간은 짧다... 0.6초!)
    sun.x += Math.sin(sun.t * 1.6) * 2.2;
    if (sun.t > 38) {
      sun.state = "dive"; sun.t = 0;
      sun.sx = sun.x; sun.sy = sun.y;
      const dir = player.x >= sun.x ? 1 : -1;
      // 플레이어를 지나쳐 가는 U자 급강하 (너무 멀면 260px까지만 - 공정하게!)
      sun.ex = sun.sx + Math.max(-260, Math.min(260, player.x + dir * 50 - sun.sx));
      beep(1300, 140, 0.35, 0.16, "sawtooth"); // 낙하 비명!
    }

  } else if (sun.state === "dive") {
    // U자 곡선: 지면을 스칠 만큼 낮게, 훨씬 빠르게!
    const p01 = Math.min(1, sun.t / 55);
    sun.x = sun.sx + (sun.ex - sun.sx) * p01;
    sun.y = sun.sy + (152 - sun.sy) * Math.sin(Math.PI * p01);
    // 불꽃 꼬리 파티클
    if (game.time % 3 === 0) particles.push({ x: sun.x, y: sun.y, color: "#ff6a3a", life: 12, vx: (Math.random() - 0.5), vy: -0.5 });
    if (p01 >= 1) { sun.state = "cool"; sun.t = 0; }

  } else if (sun.state === "cool") {
    // 숨 돌릴 틈은 잠깐뿐... 곧바로 다시 조준!
    const targetX = player.x - 60;
    sun.x += (targetX - sun.x) * 0.05;
    sun.y += (26 - sun.y) * 0.08;
    if (sun.t > 55) { sun.state = "windup"; sun.t = 0; }
  }

  // 태양에 닿으면 아야! (무적이면 무시) - 판정도 큼직하게
  if (!player.dying && player.invincible === 0 &&
      overlap(player, { x: sun.x - 7, y: sun.y - 7, w: 14, h: 14 })) {
    hurtPlayer();
  }
}

// 회오리: 닿으면 하늘 높이 붕~! 잘 쓰면 넓은 구멍도 건너는 바람 엘리베이터
function updateTornados() {
  for (const tn of tornados) {
    tn.cd = Math.max(0, tn.cd - 1);
    if (tn.cd === 0 && !player.dying && !player.climbing && overlap(player, tn)) {
      tn.cd = 30;
      player.vy = -7.8;                 // 스프링(-7.7)만큼 높이!
      player.noCut = true;              // 끝까지 올라가요
      // 진행 방향으로 밀어줘요: 천천히 들어와도 멀리 날아가게
      if (Math.abs(player.vx) < 2) player.vx = player.face * 2.6;
      else player.vx *= 1.3;
      SFX.spring();
      for (let i = 0; i < 6; i++) spawnSparkle(tn.x + 7, tn.y + tn.h - i * 8, "#cfcfcf");
    }
  }
}

function damageBoss() {
  boss.hp--;
  boss.hurtT = 35;
  game.score += 400;
  SFX.bossHurt();
  spawnSparkle(boss.x + 15, boss.y + 20, "#c266ff");
  if (boss.hp <= 0) {
    boss.alive = false;
    game.score += 3000;
    game.shake = 25;
    flagVisible = true;
    SFX.bossDie();
    for (let i = 0; i < 60; i++)
      spawnSparkle(boss.x + 15 + (Math.random() - 0.5) * 40, boss.y + 24 + (Math.random() - 0.5) * 40,
        ["#c266ff", "#ffd447", "#ff8830", "#ffffff"][i % 4]);
  }
}

function updateBoss() {
  if (!boss || !boss.alive) return;

  const dist = Math.abs(player.x + 5 - (boss.x + 15));
  if (!boss.active && dist < 170) {
    boss.active = true;
    game.shake = 15;
    SFX.bossRoar();
  }
  if (!boss.active) return;

  boss.timer++;
  boss.hurtT = Math.max(0, boss.hurtT - 1);

  if (!player.dying) boss.dir = Math.sign(player.x - boss.x) || boss.dir;
  boss.vx = (boss.onGround ? 0.45 : 0.9) * boss.dir;

  const wasAir = !boss.onGround;
  if (boss.onGround && boss.timer % 140 === 0) boss.vy = -4.4;
  boss.vy = Math.min(boss.vy + GRAVITY * 0.85, MAX_FALL);
  moveBody(boss);
  boss.x = Math.max(boss.x, boss.minX); // 결투장 밖으로는 못 나가요
  if (wasAir && boss.onGround) { game.shake = Math.max(game.shake, 8); }
  boss.anim += Math.abs(boss.vx) * 0.1;

  if (!player.dying && overlap(player, boss)) {
    if (player.vy > 0 && player.y + player.h - boss.y < 12) {
      player.vy = -4.5;
      player.noCut = true;
      if (boss.hurtT === 0) damageBoss();
    } else if (player.invincible === 0 && boss.hurtT < 25) {
      hurtPlayer();
    }
  }
}

function spawnSparkle(x, y, color) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x, y, color, life: 30 + Math.random() * 20,
      vx: (Math.random() - 0.5) * 2.4, vy: -Math.random() * 2.5,
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life--;
  }
  particles = particles.filter((p) => p.life > 0);
}

function updateCamera() {
  const target = player.x + player.w / 2 - VIEW_W / 2;
  game.camX += (target - game.camX) * 0.12;
  game.camX = Math.max(0, Math.min(game.camX, levelW * TILE - VIEW_W));
  game.shake = Math.max(0, game.shake - 1);
}


/* ===== 12. 그리기 ===== */

function drawSprite(img, sx, sy, dx, dy, flip = false, w = 16, h = 16, dh = h) {
  dx = Math.round(dx); dy = Math.round(dy);
  if (flip) {
    ctx.save();
    ctx.translate(dx + w, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(img, sx, sy, w, h, 0, 0, w, dh);
    ctx.restore();
  } else {
    ctx.drawImage(img, sx, sy, w, h, dx, dy, w, dh);
  }
}

// 이웃 칸이 막혀있는지 확인 (레벨 좌우 바깥과 "천장 위"는 막힌 걸로 쳐요.
// 그래야 천장의 테두리가 아래쪽=놀이 공간 쪽을 향해요!)
function neighborSolid(x, y) {
  if (x < 0 || x >= levelW) return true;
  if (y < 0) return true; // 천장 위는 이어진 걸로
  return (solids[y] && solids[y][x]) || false;
}

// ★ 쿼드런트 오토타일: 타일을 8px 네 조각으로 나눠서 조립해요.
//   각 조각은 "그쪽에 이웃이 있으면 속살, 없으면 테두리"를 골라요.
//   덕분에 한 줄짜리 다리도 위아래가 모두 닫힌 완전한 모양이 돼요!
//   (L/R/U/D = 왼쪽/오른쪽/위/아래에 이웃 땅이 있는지)
function drawCellQuad(dx, dy, off, L, R, U, D) {
  dx = Math.round(dx); dy = Math.round(dy);
  for (let qx = 0; qx < 2; qx++) {
    for (let qy = 0; qy < 2; qy++) {
      const sx = qx === 0 ? (L ? 32 : 0) : (R ? 32 : 64); // 왼반쪽/오른반쪽
      const sy = qy === 0 ? (U ? 32 : 0) : (D ? 32 : 64); // 윗반쪽/아랫반쪽
      ctx.drawImage(zoneImg(), sx + qx * 8, sy + off + qy * 8, 8, 8, dx + qx * 8, dy + qy * 8, 8, 8);
    }
  }
}

function drawGroundCell(tx, ty, dx, dy) {
  drawCellQuad(dx, dy, zoneAt(tx).off,
    neighborSolid(tx - 1, ty), neighborSolid(tx + 1, ty),
    neighborSolid(tx, ty - 1), neighborSolid(tx, ty + 1));
}

function draw() {
  const cam = Math.round(game.camX) + (game.shake > 0 ? Math.round((Math.random() - 0.5) * 4) : 0);

  // 1) 배경색: 지금 있는 지역의 색으로 스르륵 변해요 (챕터가 바뀌는 느낌!)
  const targetBg = zoneAt(Math.floor((game.camX + VIEW_W / 2) / TILE)).bg;
  for (let i = 0; i < 3; i++) bgColor[i] += (targetBg[i] - bgColor[i]) * 0.03;
  ctx.fillStyle = `rgb(${Math.round(bgColor[0])},${Math.round(bgColor[1])},${Math.round(bgColor[2])})`;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // 1.5) 배경 구름: 천천히 흐르는 패럴랙스 (카메라보다 느리게 = 멀리 있는 느낌)
  for (const c of clouds) {
    const [sx, sy, w, h] = SPR.cloud[c.kind];
    const span = levelW * TILE + 120;
    const cx = ((c.base + game.time * c.speed - cam * 0.3) % span + span) % span - 60;
    ctx.globalAlpha = 0.35;
    ctx.drawImage(IMG.sky, sx, sy, w, h, Math.round(cx), c.y, w, h);
  }
  ctx.globalAlpha = 1;

  // 2) 하늘 장식: 별은 반짝반짝, 바람은 은은하게
  for (const s of skies) {
    ctx.globalAlpha = 0.25 + 0.2 * Math.sin((game.time + s.phase) / 30);
    drawSprite(IMG.env, s.rect[0], s.rect[1], s.x - cam, s.y);
  }
  ctx.globalAlpha = 1;

  // 공중 룬 문양 (은은하게 맥박치듯 깜빡여요)
  for (const r of runes) {
    const pulse = 0.18 + 0.14 * Math.sin((game.time + r.phase) / 40);
    const bob = Math.sin((game.time + r.phase) / 60) * 2;
    ctx.globalAlpha = pulse;
    drawSprite(IMG.env, SPR.rune[0], SPR.rune[1], r.x - cam, r.y + bob);
  }
  ctx.globalAlpha = 1;

  // 3) 나무: 제작자 예시처럼 선명한 랜드마크로! (지역마다 색이 달라요)
  for (const t of trees) {
    const [sx, sy, w, h] = SPR.trees[t.kind];
    // 테마별 세로 오프셋: 초록 나무 기준(y=96)에서 얼마나 아래에 있는지
    // (프리미엄 가을/겨울 나무는 자기 파일의 y=96에 있어서 오프셋 0)
    const themeShift = t.zone.treeOff - 96;
    ctx.drawImage(IMG[t.zone.img] || IMG.env, sx, sy + themeShift, w, h,
      Math.round(t.x + 8 - w / 2 - cam), t.bottom - h, w, h);
  }

  // 4) 사막 선인장
  for (const c of cacti) {
    const [sx, sy, w, h] = SPR.cactusDesert;
    ctx.drawImage(IMG.env, sx, sy, w, h, Math.round(c.x - cam), c.y, w, h);
  }

  // 5) 사다리
  for (const l of ladders) {
    drawSprite(IMG.env, SPR.ladder[0], SPR.ladder[1], l.tx * TILE - cam, l.ty * TILE);
  }

  // 5.5) 수초: 물 바닥에서 하늘하늘 (물색 덧칠 전에 그려서 물속에 잠긴 느낌!)
  for (const wp of waterPlants) {
    const fr = Math.floor((game.time + wp.phase) / 14) % 4;
    const baseX = wp.yellow ? SPR.waterPlant.yellow : SPR.waterPlant.pink;
    drawSprite(IMG.pwater, baseX + fr * 16, SPR.waterPlant.y, wp.x - cam, wp.y);
  }

  // 5.7) 모래늪(유사): 일반 모래보다 밝은 색 + 표면이 스멀스멀 움직여요
  for (const q of quicksands) {
    const qx = q.tx * TILE - cam, qy = q.ty * TILE;
    ctx.fillStyle = "#8a6f35";
    ctx.fillRect(qx, qy, TILE, TILE);
    // 표면 칸(위가 모래늪이 아닌 칸)엔 흐르는 물결 점 애니메이션
    if (!quickSet.has(q.tx + "," + (q.ty - 1))) {
      ctx.fillStyle = "#d8b24a";
      const shift = Math.floor(game.time / 12) % 8;
      for (let dx = ((q.tx * 5 + shift) % 8); dx < TILE; dx += 8) ctx.fillRect(qx + dx, qy, 4, 2);
      ctx.fillStyle = "#bb954040";
    } else {
      // 깊은 칸엔 어두운 점 (깊이감)
      ctx.fillStyle = "#6f5828";
      ctx.fillRect(qx + (q.tx % 2) * 8 + 3, qy + 6, 3, 3);
    }
  }

  // 6) 헤엄칠 물
  const waveShift = Math.floor(game.time / 20) % 4;
  for (const w of swimCells) {
    ctx.fillStyle = "rgba(80, 150, 255, 0.20)";
    ctx.fillRect(w.tx * TILE - cam, w.ty * TILE, TILE, TILE);
    if (!swimSet.has(w.tx + "," + (w.ty - 1))) {
      const seg = ((w.tx + waveShift) % 4) * 16;
      drawSprite(zoneImg(), seg, SPR.water, w.tx * TILE - cam, w.ty * TILE);
    }
  }

  // 7) 장식용 물
  for (const w of waters) {
    const seg = ((w.tx + waveShift) % 4) * 16;
    drawSprite(zoneImg(), seg, SPR.water, w.tx * TILE - cam, w.ty * TILE);
  }

  // 8) 지형 타일 (무너지는 발판 칸은 따로 그리니까 건너뛰어요)
  const startTx = Math.floor(cam / TILE), endTx = startTx + VIEW_W / TILE + 1;
  for (let ty = 0; ty < solids.length; ty++) {
    for (let tx = Math.max(0, startTx); tx <= endTx && tx < levelW; tx++) {
      if (solids[ty][tx] && !crumbleMap.has(tx + "," + ty)) {
        drawGroundCell(tx, ty, tx * TILE - cam, ty * TILE);
      }
    }
  }

  // 9) 무너지는 발판 (흔들리는 연출! 옆이 무너지면 테두리도 다시 닫혀요)
  for (const c of crumbles) {
    if (c.state === 2) continue; // 무너진 동안은 안 보여요
    const shakeX = c.state === 1 ? (c.timer % 4 < 2 ? 1 : -1) : 0;
    drawGroundCell(c.tx, c.ty, c.tx * TILE - cam + shakeX, c.ty * TILE);
  }

  // 10) 잔장식 (잔디/꽃/바위 - 지역 색에 맞춰서)
  for (const d of decors) {
    drawSprite(zoneImg(), d.rect[0], d.rect[1] + d.off, d.x - cam, d.y);
  }

  // 11) 코인
  for (const c of coins) {
    if (c.taken) continue;
    const bob = Math.sin(game.time / 20 + c.x) * 1.5;
    drawSprite(IMG.env, SPR.coin[0], SPR.coin[1], c.x - cam, c.y + bob);
  }

  // 12) 당근
  for (const c of carrots) {
    if (c.taken) continue;
    const bob = Math.sin(game.time / 15) * 1;
    drawSprite(IMG.enemies, SPR.carrot[0], SPR.carrot[1], c.x - cam, c.y + bob);
  }

  // 12.5) 무기 아이템 (둥실둥실 떠 있어요)
  for (const w of weaponItems) {
    if (w.taken) continue;
    const bob = Math.sin(game.time / 18 + w.x) * 1.5;
    const ic = SPR.weaponIcon[w.kind];
    drawSprite(IMG.weapons, ic[0], ic[1], w.x - cam, w.y + bob);
  }

  // 12.6) 수집품 (젤리·물약·케이크, 둥실둥실)
  for (const c of collectibles) {
    if (c.taken) continue;
    const bob = Math.sin(game.time / 16 + c.x) * 1.5;
    const ic = SPR.collect[c.kind];
    drawSprite(IMG.collect, ic[0], ic[1], c.x - cam, c.y + bob);
  }

  // 13) 스프링 (코드로 그린 용수철 - 밟으면 납작해져요)
  for (const s of springs) {
    const sx = Math.round(s.x - cam), squish = s.anim > 6 ? 4 : 0;
    ctx.strokeStyle = "#ffd447";
    ctx.lineWidth = 1;
    ctx.beginPath();
    const top = s.y + 6 + squish;
    ctx.moveTo(sx + 3, s.y + 16);
    ctx.lineTo(sx + 13, top + 2);
    ctx.moveTo(sx + 3, top + 2);
    ctx.lineTo(sx + 13, s.y + 16);
    ctx.stroke();
    ctx.fillStyle = "#ffd447";
    ctx.fillRect(sx + 2, top, 12, 2);       // 윗판
    ctx.fillRect(sx + 2, s.y + 15, 12, 2);  // 바닥판
  }

  // 14) 움직이는 발판: 사방이 닫힌 2칸짜리 막대 모양으로!
  for (const p of platforms) {
    const off = zoneAt(Math.floor(p.cx / TILE)).off;
    drawCellQuad(p.x - cam, p.y, off, false, true, false, false);      // 왼쪽 끝
    drawCellQuad(p.x + 16 - cam, p.y, off, true, false, false, false); // 오른쪽 끝
  }

  // 15) 체크포인트 깃대 (지나면 초록불!)
  for (const cp of checkpoints) {
    const x = Math.round(cp.x + 7 - cam);
    ctx.fillStyle = "#bbb";
    ctx.fillRect(x, cp.y - 12, 2, 28);
    ctx.fillStyle = cp.active ? "#4bd44b" : "#666";
    const g = cp.active ? Math.sin(game.time / 10) * 1.5 : 0;
    ctx.fillRect(x + 2, cp.y - 12 + g, 6, 5);
    if (cp.active && game.time % 30 === 0) spawnSparkle(cp.x + 8, cp.y - 10, "#4bd44b");
  }

  // 16) 골인 깃발
  if (flag && flagVisible) {
    const fx = Math.round(flag.x + 7 - cam);
    ctx.fillStyle = "#e8e8e8";
    ctx.fillRect(fx, flag.y - 32, 2, 48);
    ctx.fillStyle = "#4bd44b";
    const fw = 10 + Math.sin(game.time / 10) * 1.5;
    ctx.beginPath();
    ctx.moveTo(fx + 2, flag.y - 32);
    ctx.lineTo(fx + 2 + fw, flag.y - 27);
    ctx.lineTo(fx + 2, flag.y - 22);
    ctx.fill();
  }

  // 17) 슬라임 & 뱀 (뱀은 프리미엄 시트의 다른 그림 + 더 빠름)
  for (const s of slimes) {
    if (!s.alive) continue;
    if (s.kind === "snake") {
      if (s.squash > 0) {
        drawSprite(IMG.penemies, SPR.snake.flat[0], SPR.snake.flat[1], s.x - 2 - cam, s.y + 10 - 6, false, 16, 16, 6);
      } else {
        const f = SPR.snake.walk[Math.floor(s.anim) % 4];
        drawSprite(IMG.penemies, f[0], f[1], s.x - 2 - cam, s.y - 6, s.vx < 0);
      }
    } else if (s.squash > 0) {
      drawSprite(IMG.enemies, SPR.slime.walk[0][0], SPR.slime.walk[0][1], s.x - 2 - cam, s.y + 10 - 6, false, 16, 16, 6);
    } else {
      const f = SPR.slime.walk[Math.floor(s.anim) % 3];
      drawSprite(IMG.enemies, f[0], f[1], s.x - 2 - cam, s.y - 6, s.vx > 0);
    }
  }

  // 18) 새
  for (const b of birds) {
    if (!b.alive) continue;
    const f = SPR.bird[Math.floor(b.t / 6) % 4];
    drawSprite(IMG.enemies, f[0], f[1], b.x - 2 - cam, b.y - 4, b.dirX > 0);
  }

  // 18.2) 물고기 (물속 순찰자 - 헤엄치는 방향을 바라봐요)
  for (const f of fishes) {
    if (!f.alive) continue;
    const fr = SPR.fish.swim[Math.floor(f.anim) % 4];
    drawSprite(IMG.penemies, fr[0], fr[1], f.x - 1 - cam, f.y - 3, f.dir > 0);
  }

  // 18.3) 회오리: 아래는 좁고 위는 넓은 소용돌이가 빙글빙글
  for (const tn of tornados) {
    const cxx = tn.x + tn.w / 2 - cam;
    for (let i = 0; i < 6; i++) {
      const w = 8 + i * 4;                                   // 위로 갈수록 넓게
      const yy = tn.y + tn.h - 8 - i * 7;
      const off = Math.sin(game.time / 4 + i * 1.4 + tn.phase) * 3;
      ctx.strokeStyle = i % 2 ? "#d8d8d8" : "#8f8f8f";
      ctx.lineWidth = 1;
      ctx.strokeRect(Math.round(cxx - w / 2 + off), Math.round(yy), w, 5);
    }
  }

  // 18.4) NPC (평화로운 대화 캐릭터)
  for (const n of npcs) {
    n.anim += 0.03;
    const f = SPR.npc[n.kind][Math.floor(n.anim) % 2];
    drawSprite(IMG.npcs, f[0], f[1], n.x - cam, n.y);
    // 말 걸 수 있으면 머리 위에 "!" 표시
    if (n === activeNpc) {
      ctx.fillStyle = "#ffd447";
      ctx.fillText("!", n.x + 6 - cam, n.y - 4 + Math.sin(game.time / 8) * 1);
    }
  }

  // 18.5) 포자버섯 (프리미엄 적)
  for (const s of shooters) {
    if (!s.alive) continue;
    if (s.squash > 0) {
      // 밟히면 납작하게
      drawSprite(IMG.penemies, SPR.mushroom.idle[0][0], SPR.mushroom.idle[0][1], s.x - 2 - cam, s.y + 4 - 6, false, 16, 16, 6);
    } else {
      // 공격 자세일 땐 attack 프레임, 평소엔 idle 2프레임 왕복
      const f = s.atk > 0 ? SPR.mushroom.attack[Math.floor(s.anim * 2) % 2] : SPR.mushroom.idle[Math.floor(s.anim) % 2];
      drawSprite(IMG.penemies, f[0], f[1], s.x - 2 - cam, s.y - 4, s.face > 0);
    }
  }
  // 18.6) 적 포자 (빨간 구슬)
  for (const es of enemyShots) {
    ctx.fillStyle = "#ff4b4b";
    ctx.fillRect(Math.round(es.x - cam), Math.round(es.y), 4, 4);
    ctx.fillStyle = "#ff9090";
    ctx.fillRect(Math.round(es.x - cam + 1), Math.round(es.y + 1), 2, 2);
  }

  // 19) 보스
  if (boss && boss.alive) {
    const B = SPR.boss;
    let frame;
    if (boss.hurtT > 20) frame = B.hit;
    else if (!boss.onGround) frame = B.move;
    else frame = B.idle[Math.floor(boss.timer / 25) % 2];
    if (!(boss.hurtT > 0 && Math.floor(game.time / 3) % 2 === 0)) {
      drawSprite(IMG.bosses, frame[0], frame[1], boss.x - 4 - cam, boss.y - 6, boss.dir < 0, B.w, B.h);
    }
    if (boss.active) {
      const bx = Math.round(boss.x - 4 - cam);
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(bx, boss.y - 14, B.w, 4);
      ctx.fillStyle = "#ff4b4b";
      ctx.fillRect(bx + 1, boss.y - 13, (B.w - 2) * (boss.hp / boss.maxHp), 2);
    }
  }

  // 20) 발사체
  for (const sh of shots) {
    drawSprite(IMG.player, SPR.shot[0], SPR.shot[1], sh.x - 6, sh.y - 8);
    if (game.time % 3 === 0) {
      particles.push({ x: sh.x + 2, y: sh.y + 2, color: "#ffd447", life: 8, vx: 0, vy: 0 });
    }
  }

  // 21) 플레이어
  const blink = player.invincible > 0 && Math.floor(game.time / 4) % 2 === 0;
  if (!blink) {
    const set = player.big ? SPR.large : SPR.small;
    let sx, sy;
    if (player.dying) [sx, sy] = set.hit;
    else if (player.climbing) [sx, sy] = set.climb[Math.floor(player.anim) % 2];
    else if (player.inWater) [sx, sy] = set.swim[Math.floor(player.anim) % 2];
    else if (player.atkPose > 0) [sx, sy] = set.attack[player.atkPose > 6 ? 0 : 1];
    else if (!player.onGround) [sx, sy] = player.vy < 0 ? set.jump : set.fall;
    else if (Math.abs(player.vx) > 0.3) [sx, sy] = set.walk[Math.floor(player.anim) % 4];
    else [sx, sy] = set.idle[Math.floor(game.time / 40) % 2];
    drawSprite(IMG.player, sx, sy, player.x - 3 - cam, player.y + player.h - 16, player.face < 0);
  }

  // 21.3) 모래늪 반투명 덧칠: 플레이어가 모래에 '잠겨' 보이게 (플레이어 그린 뒤에!)
  if (quicksands.length) {
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = "#8a6f35";
    for (const q of quicksands) ctx.fillRect(q.tx * TILE - cam, q.ty * TILE, TILE, TILE);
    ctx.globalAlpha = 1;
  }

  // 21.5) 검 휘두르기 이펙트 (흰 호가 앞에서 번쩍)
  if (player.meleeT > 0) {
    const mx = Math.round(player.x + (player.face > 0 ? player.w : -14) - cam);
    ctx.strokeStyle = "rgba(255,255,255," + (player.meleeT / 12) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x + player.w / 2 - cam + player.face * 6, player.y + 6, 12, -1, 1);
    ctx.stroke();
  }

  // 22) 파티클
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillRect(Math.round(p.x - cam), Math.round(p.y), 2, 2);
  }
  ctx.globalAlpha = 1;

  // 23) 분노한 태양: 빙글빙글 광선 + 화난 얼굴 (맞으면 빨갛게 번쩍)
  if (sun && sun.alive) {
    const sxx = Math.round(sun.x - cam), syy = Math.round(sun.y);
    const angry = sun.state !== "follow";
    // 분노하면 하늘이 붉게 달아올라요 (열기가 고동치는 느낌)
    if (angry) {
      const pulse = 0.05 + 0.04 * Math.sin(game.time / 5) + (sun.state === "dive" ? 0.05 : 0);
      ctx.fillStyle = "rgba(255,70,20," + pulse.toFixed(3) + ")";
      ctx.fillRect(0, 16, VIEW_W, VIEW_H - 16);
    }
    const flash = sun.hurtT > 0 && Math.floor(game.time / 3) % 2 === 0;
    ctx.strokeStyle = flash ? "#fff" : angry ? "#ff6a3a" : "#ffd447";
    ctx.lineWidth = 1.5;
    // 광선 8개 (분노하면 빨리 돌아요)
    const spin = game.time / (angry ? 6 : 20);
    for (let i = 0; i < 8; i++) {
      const a = spin + (i * Math.PI) / 4;
      ctx.beginPath();
      ctx.moveTo(sxx + Math.cos(a) * 8, syy + Math.sin(a) * 8);
      ctx.lineTo(sxx + Math.cos(a) * 12, syy + Math.sin(a) * 12);
      ctx.stroke();
    }
    // 몸통 원
    ctx.beginPath(); ctx.arc(sxx, syy, 7, 0, Math.PI * 2); ctx.stroke();
    // 화난 눈썹 + 눈 + 입
    ctx.fillStyle = ctx.strokeStyle;
    ctx.fillRect(sxx - 4, syy - 2, 2, 2); ctx.fillRect(sxx + 2, syy - 2, 2, 2);       // 눈
    if (angry) {
      ctx.beginPath(); ctx.moveTo(sxx - 5, syy - 5); ctx.lineTo(sxx - 1, syy - 3); ctx.stroke();  // 눈썹 ↘
      ctx.beginPath(); ctx.moveTo(sxx + 5, syy - 5); ctx.lineTo(sxx + 1, syy - 3); ctx.stroke();  // 눈썹 ↙
      ctx.fillRect(sxx - 2, syy + 3, 4, 2);   // 앙다문 입
    } else {
      ctx.fillRect(sxx - 2, syy + 3, 4, 1);   // 무표정
    }
  }

  drawHUD();

  // NPC 대화창: 말 걸 수 있는 NPC 근처에 있으면 하단에 대사 표시
  if (game.state === "play" && activeNpc) {
    ctx.fillStyle = "rgba(16,15,15,0.85)";
    ctx.fillRect(8, VIEW_H - 26, VIEW_W - 16, 20);
    ctx.strokeStyle = "#ffd447"; ctx.lineWidth = 1;
    ctx.strokeRect(8.5, VIEW_H - 25.5, VIEW_W - 17, 19);
    ctx.fillStyle = "#ffd447";
    ctx.font = "8px monospace";
    ctx.textAlign = "left";
    const names = { citizen: "시민", king: "왕", wizard: "마법사", merchant: "상인" };
    ctx.fillText(names[activeNpc.kind] + ":", 14, VIEW_H - 15);
    ctx.fillStyle = "#fff";
    ctx.fillText(activeNpc.text, 44, VIEW_H - 15);
  }

  if (game.state === "title") drawStageSelect();
  if (game.state === "intro") drawOverlay("WORLD " + STAGES[stageIndex].id, STAGES[stageIndex].title, "#ffd447");
  if (game.state === "gameover") drawOverlay("GAME OVER", "R 키로 다시 도전!", "#ff4b4b");
  if (game.state === "clear") drawOverlay("STAGE CLEAR!",
    stageIndex < STAGES.length - 1 ? "다음 스테이지로 갑니다..." : "마지막 스테이지 클리어!", "#ffd447");
  if (game.state === "ending") drawOverlay("★ ALL CLEAR! ★", `모든 월드 정복! 점수 ${game.score}  |  R 키로 처음부터`, "#ff8830");
}

function drawHUD() {
  ctx.fillStyle = "rgba(16,15,15,0.75)"; // 천장 위에서도 글씨가 잘 보이게
  ctx.fillRect(0, 0, VIEW_W, 14);
  ctx.fillStyle = "#fff";
  ctx.font = "8px monospace";
  ctx.fillText("SCORE " + String(game.score).padStart(6, "0"), 6, 10);
  drawSprite(IMG.env, SPR.coin[0], SPR.coin[1], 106, -1);
  ctx.fillText("x" + game.coinCount, 122, 10);
  ctx.fillStyle = "#ff4b6e";
  for (let i = 0; i < game.lives; i++) ctx.fillText("♥", 158 + i * 10, 10);
  if (player.big) drawSprite(IMG.enemies, SPR.carrot[0], SPR.carrot[1], 192, -1);
  // 현재 무기 아이콘 (기본 구슬이 아닐 때만)
  if (player.weapon !== "basic" && SPR.weaponIcon[player.weapon]) {
    const ic = SPR.weaponIcon[player.weapon];
    drawSprite(IMG.weapons, ic[0], ic[1], 210, -1);
  }
  // 지금 몇 스테이지인지 표시 (예: W 1-2)
  ctx.fillStyle = "#8a8a8a";
  ctx.fillText("W " + STAGES[stageIndex].id, 272, 10);
}

function drawOverlay(title, sub, color) {
  ctx.fillStyle = "rgba(16,15,15,0.75)";
  ctx.fillRect(0, 60, VIEW_W, 70);
  ctx.textAlign = "center";
  ctx.fillStyle = color;
  ctx.font = "bold 16px monospace";
  ctx.fillText(title, VIEW_W / 2, 90);
  ctx.fillStyle = "#ddd";
  ctx.font = "8px monospace";
  ctx.fillText(sub, VIEW_W / 2, 110);
  ctx.textAlign = "left";
}

// 스테이지 선택 화면: 5월드 × 3스테이지 격자에서 커서로 골라요
function drawStageSelect() {
  if (game.sel === undefined) game.sel = 0; // 커서 위치 안전 기본값
  // 월드별 대표 색 (숲/사막/밤/가을/겨울/도시)
  const ZC = ["#4bd44b", "#ff8830", "#6f7bff", "#ffa040", "#7fd4ff", "#c266ff"];
  const WNAME = ["숲", "사막", "밤", "가을", "겨울", "도시"];

  // 반투명 패널로 배경 지형을 살짝 가려요 (글씨가 잘 보이게)
  ctx.fillStyle = "rgba(16,15,15,0.84)";
  ctx.fillRect(0, 16, VIEW_W, VIEW_H - 16);

  // 로고
  ctx.textAlign = "center";
  ctx.fillStyle = "#4bd44b";
  ctx.font = "bold 13px monospace";
  ctx.fillText("RETRO LINES 점프!", VIEW_W / 2, 34);

  // 6×3 격자 (칸 크기 42×12, 6개 월드가 다 들어가게 압축)
  const cw = 42, ch = 12, gapX = 4, gapY = 3;
  const rows = Math.ceil(STAGES.length / 3);
  const gridW = 3 * cw + 2 * gapX;
  const x0 = (VIEW_W - gridW) / 2, y0 = 38;
  ctx.font = "8px monospace";
  for (let i = 0; i < STAGES.length; i++) {
    const col = i % 3, row = Math.floor(i / 3);
    const x = x0 + col * (cw + gapX), y = y0 + row * (ch + gapY);
    const color = ZC[STAGES[i].zone];
    const selected = i === game.sel;
    // 칸 배경
    ctx.fillStyle = selected ? color : "rgba(255,255,255,0.06)";
    ctx.globalAlpha = selected ? 0.9 : 1;
    ctx.fillRect(x, y, cw, ch);
    ctx.globalAlpha = 1;
    // 선택된 칸은 밝은 테두리로 깜빡깜빡
    if (selected) {
      ctx.strokeStyle = Math.floor(game.time / 8) % 2 ? "#fff" : color;
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, cw - 1, ch - 1);
    }
    // 스테이지 번호 (선택 시 검정, 아니면 테마색)
    ctx.fillStyle = selected ? "#1c1b1b" : color;
    ctx.fillText(STAGES[i].id, x + cw / 2, y + 9);
  }

  // 맨 왼쪽에 월드 이름 라벨
  ctx.textAlign = "right";
  for (let r = 0; r < rows; r++) {
    ctx.fillStyle = ZC[r];
    ctx.fillText(WNAME[r], x0 - 8, y0 + r * (ch + gapY) + 9);
  }

  // 하단: 선택한 스테이지 제목 + 조작 안내
  ctx.textAlign = "center";
  const s = STAGES[game.sel];
  const hasBoss = s.map.some((r) => r.includes("B"));
  ctx.fillStyle = "#ffd447";
  ctx.font = "bold 9px monospace";
  ctx.fillText("▶ " + s.id + "  " + s.title + (hasBoss ? "  👹" : ""), VIEW_W / 2, 168);
  ctx.fillStyle = "#aaa";
  ctx.font = "8px monospace";
  ctx.fillText("화살표 이동  ·  스페이스로 시작", VIEW_W / 2, 182);
  ctx.textAlign = "left";
}


/* ===== 13. 게임 루프 ===== */

function gameLoop() {
  game.time++;
  game.stateT = (game.stateT || 0) + 1; // 지금 상태가 몇 프레임째인지

  // ESC 키: 게임 중 언제든 스테이지 선택 화면으로 돌아가요
  // (커서는 방금 하던 스테이지에 놓여서 바로 다시 도전 가능!)
  if (keys.Escape && game.state !== "title") {
    keys.Escape = false;          // 한 번만 처리 (꾹 눌러도 반복 안 되게)
    checkpoint = null;            // 체크포인트 초기화
    game = { state: "title", score: 0, lives: 3, coinCount: 0, camX: 0,
             time: game.time, shake: 0, stateT: 0, sel: stageIndex };
    parseLevel();                 // 지금 스테이지를 배경 그림용으로 다시 준비
  }

  if (game.state === "title") {
    // ===== 스테이지 선택 화면: 화살표로 고르고 스페이스로 시작! =====
    if (game.sel === undefined) game.sel = 0;
    // navCd(이동 쿨다운): 화살표를 눌러도 8프레임에 한 칸씩만 → 커서가 안 미끄러져요
    game.navCd = Math.max(0, (game.navCd || 0) - 1);
    if (game.navCd === 0) {
      let moved = true;
      if ((keys.ArrowLeft || keys.KeyA) && game.sel > 0) game.sel--;
      else if ((keys.ArrowRight || keys.KeyD) && game.sel < STAGES.length - 1) game.sel++;
      else if ((keys.ArrowUp || keys.KeyW) && game.sel >= 3) game.sel -= 3;      // 위 월드
      else if ((keys.ArrowDown || keys.KeyS) && game.sel < STAGES.length - 3) game.sel += 3; // 아래 월드
      else moved = false;
      if (moved) game.navCd = 8;
    }
    // 숫자 1~5로 월드 첫 스테이지에 바로 커서 이동
    for (let w = 1; w <= 6; w++) {
      if (keys["Digit" + w] || keys["Numpad" + w]) game.sel = (w - 1) * 3;
    }
    // 스페이스/엔터로 선택한 스테이지 시작!
    if (keys.Space || keys.Enter) startStage(game.sel);
  } else if (game.state === "intro") {
    // "WORLD 1-1" 카드를 1.5초 보여주고 시작!
    if (game.stateT > 90) game.state = "play";
  } else if (game.state === "play") {
    updateGimmicks();  // 발판이 먼저 움직이고
    updatePlayer();    // 플레이어가 따라가요
    updateShots();
    updateSlimes();
    updateBirds();
    updateFishes();
    updateShooters();
    updateSun();
    updateTornados();
    updateBoss();
    updateParticles();
    updateCamera();
  } else if (game.state === "clear") {
    updateParticles();
    // 3초쯤 축하한 뒤 다음 스테이지로! (마지막이면 엔딩)
    if (game.stateT > 200) {
      if (stageIndex < STAGES.length - 1) startStage(stageIndex + 1);
      else { game.state = "ending"; game.stateT = 0; }
    }
  } else {
    // gameover 또는 ending 화면
    updateParticles();
    if (game.state === "ending" && game.time % 20 === 0) {
      // 엔딩 불꽃놀이!
      spawnSparkle(40 + (game.time * 37) % 240, 30 + (game.time * 53) % 90,
        ["#ffd447", "#4bd44b", "#ff8830", "#ff4b8f"][(game.time / 20 | 0) % 4]);
    }
    if (keys.KeyR) {
      // R을 누르면 스테이지 선택 화면으로 돌아가요 (배경용으로 1-1을 미리 파싱)
      checkpoint = null;
      game = { state: "title", score: 0, lives: 3, coinCount: 0, camX: 0, time: 0, shake: 0, stateT: 0, sel: 0 };
      stageIndex = 0; parseLevel();
    }
  }

  draw();
  requestAnimationFrame(gameLoop);
}

</script>
